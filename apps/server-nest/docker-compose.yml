services:
  mysql:
    image: mysql:8.0
    container_name: family-inventory-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: family_inventory
      MYSQL_USER: family_inventory
      MYSQL_PASSWORD: family_inventory
    ports:
      - "3306:3306"
    volumes:
      - family-inventory-mysql:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: family-inventory-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - family-inventory-redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  family-inventory-mysql:
  family-inventory-redis:
