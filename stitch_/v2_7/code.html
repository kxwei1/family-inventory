<img alt="Premium dog food bag standing upright against a clean white background in bright studio lighting." class="w-full h-full object-cover" data-alt="A premium bag of dry dog food standing upright against a pristine white studio background. The lighting is high-key and bright, highlighting the crisp, modern packaging design. The color palette features a clean white base with vibrant, fresh mint green and deep forest green accents. The overall mood is healthy, vibrant, and professional, aligning perfectly with a modern pet care aesthetic." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBfI-6naRc6O7A0RsDBPvzktnJUGHYE6SP7j0HOa168qJhkqPi5CYQCbPAw619lZ-tC5uTvpFCjIP1OX00MajqqR_OwlBnh-uUhIZGCQpWb9JteqrYNKH0xEudMfvgIF1Gqm8Xqpeas3Hak37fJbGW7zjrdZZHznAT60gVe6x-kGrFJ_ZU6N94LCp5UaYvhH-shlZgQu1k984SZQc67awe22SagQFk8SedSrAMm5EKXudwhjGR6e1fb-B1ZKEjk8qlVk62yWhg"/>

<script>
        // Simple Interaction Logic
        document.addEventListener('DOMContentLoaded', () => {
            const btnMinus = document.getElementById('btnMinus');
            const btnPlus = document.getElementById('btnPlus');
            const qtyInput = document.getElementById('qtyInput');
            const typeChips = document.querySelectorAll('.type-chip');
            const bottomSheet = document.getElementById('bottomSheet');
            const backdrop = document.getElementById('backdrop');
            const closeBtn = document.getElementById('closeBtn');

            // Stepper Logic
            btnMinus.addEventListener('click', () => {
                let val = parseInt(qtyInput.value) || 1;
                if (val > 1) qtyInput.value = val - 1;
            });

            btnPlus.addEventListener('click', () => {
                let val = parseInt(qtyInput.value) || 0;
                if (val < 99) qtyInput.value = val + 1;
            });

            // Input validation
            qtyInput.addEventListener('change', (e) => {
                let val = parseInt(e.target.value);
                if (isNaN(val) || val < 1) e.target.value = 1;
                if (val > 99) e.target.value = 99;
            });

            // Chips Selection Logic
            typeChips.forEach(chip => {
                chip.addEventListener('click', () => {
                    // Reset all chips
                    typeChips.forEach(c => {
                        c.className = 'type-chip px-5 py-2.5 rounded-full border border-border-light bg-surface-white text-text-secondary font-body-sm text-body-sm hover:bg-surface-container-low transition-colors';
                    });
                    // Set active chip
                    chip.className = 'type-chip px-5 py-2.5 rounded-full border border-primary bg-bg-mint text-primary font-body-sm text-body-sm font-medium transition-colors';
                });
            });

            // Close Animation Demo (For visual testing)
            closeBtn.addEventListener('click', () => {
                bottomSheet.style.transform = 'translateY(100%)';
                backdrop.style.opacity = '0';
                setTimeout(() => {
                    // Reset for demo purposes
                    bottomSheet.style.transform = 'translateY(0)';
                    backdrop.style.opacity = '1';
                }, 1000);
            });
        });
    </script>
