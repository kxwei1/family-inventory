<body class="bg-bg-cloud text-on-surface antialiased min-h-screen flex flex-col relative pb-[100px]">
<!-- TopAppBar -->
<header class="bg-bg-cloud dark:bg-inverse-surface w-full top-0 sticky z-50 transition-all duration-300 border-b border-transparent" id="topAppBar">
<div class="flex items-center justify-between px-edge-margin h-button-height w-full">
<button aria-label="返回" class="flex items-center justify-center w-10 h-10 -ml-2 text-primary dark:text-primary-fixed-dim hover:opacity-80 transition-opacity active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[24px]">arrow_back_ios_new</span>
</button>
<h1 class="font-page-title text-section-title text-on-surface absolute left-1/2 transform -translate-x-1/2">皇家幼猫粮</h1>
<button aria-label="更多" class="flex items-center justify-center w-10 h-10 -mr-2 text-primary dark:text-primary-fixed-dim hover:opacity-80 transition-opacity active:scale-95 transition-transform">
<span class="material-symbols-outlined text-[24px]">more_horiz</span>
</button>
</div>
</header>
<!-- Canvas -->
<main class="flex-1 w-full max-w-md mx-auto">
<!-- Hero Image -->
<section class="w-full aspect-video relative bg-surface-container-high overflow-hidden">
<img alt="商品图" class="w-full h-full object-cover" data-alt="A high-quality, professional photograph of premium pet food packaging sitting on a clean, modern kitchen counter. The lighting is soft, natural, and bright, enhancing the brand's 'Light Tech' and youthful aesthetic. The color palette focuses on whites, light grays, and the product's subtle branding, creating a reliable and healthy mood." src="https://lh3.googleusercontent.com/aida-public/AB6AXuA9N46JEPKYWP0Vg6hPXVau9ticXvoiZs3wEc1c8xFfWc0rKe6tcba-0OH2Ev-l6McxOBcAdIxgWDV1vd4t_3bWrCK6Qkn3Nw5JYmwhzbO0mJEQIQ41jBw26jHVgV376D7PGNdR1UhCFz4F-DhMabMf7fRmlzYb5da0PlpUmRRoAp9XXl9Gxm4ZxamYLPfPbijRm-L8ahZhbDSFxedA9OSCCFWmXiPZ9elurKErItLvLp9FN2DtSR1RX0Q1lW4JV5yPShfY6zw"/>
<div class="absolute top-4 right-4 bg-[#FFF3E0] text-status-warning px-3 py-1 rounded-full font-label-bold text-label-bold shadow-sm flex items-center gap-1 backdrop-blur-sm bg-opacity-90">
<span class="material-symbols-outlined text-[14px]">warning</span>
                临期
            </div>
</section>
<!-- Product Info -->
<section class="px-edge-margin py-5 bg-surface-white rounded-b-xl shadow-[0_4px_16px_rgba(21,61,53,0.02)] relative z-10 -mt-2">
<div class="flex flex-wrap gap-2 mb-3">
<span class="bg-bg-mint text-primary-container px-2.5 py-0.5 rounded text-body-sm font-body-sm">主粮</span>
<span class="bg-bg-lake text-secondary px-2.5 py-0.5 rounded text-body-sm font-body-sm">猫咪</span>
</div>
<h2 class="font-page-title text-page-title text-on-surface mb-1">皇家 (Royal Canin) 幼猫全价猫粮</h2>
<p class="font-body-main text-body-main text-text-secondary">规格: 2kg/袋</p>
</section>
<!-- Inventory Batches (Bento Style) -->
<section class="px-edge-margin mt-stack-gap">
<h3 class="font-section-title text-section-title text-on-surface mb-3 flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-[20px]">inventory_2</span>
                库存批次
            </h3>
<div class="space-y-3">
<!-- Batch Card 1 (Warning) -->
<div class="bg-surface-white rounded-xl p-card-padding shadow-[0_4px_16px_rgba(21,61,53,0.04)] border border-[#FDE68A]/30 relative overflow-hidden">
<div class="absolute top-0 right-0 w-16 h-16 bg-gradient-to-br from-[#FEF3C7] to-transparent opacity-50 -mr-4 -mt-4 rounded-full"></div>
<div class="flex justify-between items-start mb-4">
<div>
<div class="font-label-bold text-label-bold text-status-warning bg-[#FEF3C7] px-2 py-0.5 rounded mb-1 inline-block">批次 #202311A</div>
<div class="font-body-sm text-body-sm text-text-secondary">存放位置: 储物柜顶层</div>
</div>
<div class="text-right">
<div class="font-numeric-display text-[20px] font-bold text-on-surface">0.5 <span class="text-body-sm text-text-secondary font-normal">kg</span></div>
<div class="font-body-sm text-body-sm text-status-error">剩30天过期</div>
</div>
</div>
<div class="w-full bg-surface-container-high rounded-full h-2 mb-4 overflow-hidden">
<div class="bg-status-warning h-2 rounded-full" style="width: 25%"></div>
</div>
<div class="flex gap-2 justify-end">
<button class="bg-bg-mint text-on-primary-container px-4 py-2 rounded-lg font-label-bold text-label-bold hover:bg-surface-container-highest transition-colors flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">edit</span> 编辑
                        </button>
<button class="bg-surface-container-high text-primary px-4 py-2 rounded-lg font-label-bold text-label-bold hover:bg-surface-variant transition-colors flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">remove</span> 记录消耗
                        </button>
</div>
</div>
<!-- Batch Card 2 (Normal) -->
<div class="bg-surface-white rounded-xl p-card-padding shadow-[0_4px_16px_rgba(21,61,53,0.04)]">
<div class="flex justify-between items-start mb-4">
<div>
<div class="font-label-bold text-label-bold text-text-secondary bg-surface-container-high px-2 py-0.5 rounded mb-1 inline-block">批次 #202401B</div>
<div class="font-body-sm text-body-sm text-text-secondary">存放位置: 储藏室</div>
</div>
<div class="text-right">
<div class="font-numeric-display text-[20px] font-bold text-on-surface">2.0 <span class="text-body-sm text-text-secondary font-normal">kg</span></div>
<div class="font-body-sm text-body-sm text-text-secondary">2025.01.20 到期</div>
</div>
</div>
<div class="w-full bg-surface-container-high rounded-full h-2 mb-4 overflow-hidden">
<div class="bg-primary-container h-2 rounded-full" style="width: 100%"></div>
</div>
<div class="flex gap-2 justify-end">
<button class="bg-bg-mint text-on-primary-container px-4 py-2 rounded-lg font-label-bold text-label-bold hover:bg-surface-container-highest transition-colors flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">edit</span> 编辑
                        </button>
</div>
</div>
</div>
</section>
<!-- Consumption Trend (Glassmorphism inspired) -->
<section class="px-edge-margin mt-stack-gap mb-stack-gap">
<div class="bg-gradient-to-br from-surface-white to-bg-cloud rounded-xl p-card-padding shadow-[0_8px_24px_rgba(21,61,53,0.06)] border border-surface-white relative overflow-hidden">
<div class="absolute -right-10 -top-10 w-32 h-32 bg-primary/5 rounded-full blur-2xl"></div>
<h3 class="font-section-title text-section-title text-on-surface mb-4 flex items-center justify-between">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-secondary text-[20px]">trending_down</span>
                        消耗趋势

<span class="font-body-sm text-body-sm text-text-secondary">近30天</span>
</h3>
<div class="h-32 flex items-end justify-between gap-1 mt-6 relative">

<div class="w-1/6 bg-primary-container/20 hover:bg-primary-container/40 transition-colors rounded-t-sm h-[40%] relative group">
<div class="absolute -top-8 left-1/2 transform -translate-x-1/2 bg-surface-white text-body-sm px-2 py-1 rounded shadow-sm opacity-0 group-hover:opacity-100 transition-opacity">50g</div>
</div>
<div class="w-1/6 bg-primary-container/30 hover:bg-primary-container/50 transition-colors rounded-t-sm h-[60%] relative group"></div>
<div class="w-1/6 bg-primary-container/40 hover:bg-primary-container/60 transition-colors rounded-t-sm h-[45%] relative group"></div>
<div class="w-1/6 bg-primary-container/50 hover:bg-primary-container/70 transition-colors rounded-t-sm h-[70%] relative group"></div>
<div class="w-1/6 bg-primary-container/60 hover:bg-primary-container/80 transition-colors rounded-t-sm h-[55%] relative group"></div>
<div class="w-1/6 bg-primary-container hover:bg-primary transition-colors rounded-t-sm h-[80%] relative group">
<div class="absolute -top-8 left-1/2 transform -translate-x-1/2 bg-surface-white text-body-sm px-2 py-1 rounded shadow-sm opacity-0 group-hover:opacity-100 transition-opacity whitespace-nowrap">今天 120g</div>
</div>
<!-- Faux SVG Line Overlay -->
<svg class="absolute inset-0 h-full w-full pointer-events-none" preserveaspectratio="none" viewbox="0 0 100 100">
<path d="M 8,60 L 25,40 L 41,55 L 58,30 L 75,45 L 92,20" fill="none" stroke="#18b981" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
<circle cx="92" cy="20" fill="#ffffff" r="3" stroke="#18b981" stroke-width="2"></circle>
</svg>
</div>
<div class="flex justify-between mt-2 font-body-sm text-body-sm text-text-secondary px-1">
<span>10.01</span>
<span>10.30</span>
</div>
</div>
</section>
</main>
<!-- Fixed Bottom Actions -->
<div class="fixed bottom-0 w-full max-w-md left-1/2 transform -translate-x-1/2 bg-surface-white/90 backdrop-blur-md border-t border-border-light pb-safe px-edge-margin py-3 z-50">
<div class="flex gap-3">
<button class="flex-1 h-button-height bg-bg-mint text-on-surface font-section-title text-section-title rounded-xl hover:bg-surface-container-highest transition-colors active:scale-95 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">history</span>
                查看历史
            </button>
<button class="flex-[2] h-button-height bg-primary text-on-primary font-section-title text-section-title rounded-xl hover:opacity-90 transition-opacity active:scale-95 shadow-[0_4px_12px_rgba(24,185,129,0.3)] flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]">shopping_cart</span>
                再次购买
            </button>
</div>
</div>
<script>
        // Simple scroll effect for TopAppBar
        window.addEventListener('scroll', () => {
            const header = document.getElementById('topAppBar');
            if (window.scrollY > 10) {
                header.classList.add('shadow-sm', 'border-border-light');
                header.classList.remove('border-transparent');
            } else {
                header.classList.remove('shadow-sm', 'border-border-light');
                header.classList.add('border-transparent');
            }
        });
    </script>
