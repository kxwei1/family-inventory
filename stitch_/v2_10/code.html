<style>
        .scan-line {
            background: linear-gradient(to bottom, rgba(234, 243, 255, 0), rgba(234, 243, 255, 1) 50%, rgba(234, 243, 255, 0));
            animation: scan 2s infinite linear;
        }
        @keyframes scan {
            0% { top: 0; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { top: 100%; opacity: 0; }
        }
        .bg-blur {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-black text-surface-white font-body-main antialiased h-screen w-screen overflow-hidden flex flex-col relative">
<!-- Simulated Camera Background -->
<div class="absolute inset-0 z-0">
<img alt="Dog food bag being scanned" class="w-full h-full object-cover opacity-60" data-alt="A close-up view of a premium dog food bag positioned in a bright, modern living room. The lighting is soft and natural, creating a clean, inviting atmosphere consistent with a light-mode UI aesthetic. The overall color palette leans towards whites, light greens, and soft wood tones. The focus is sharp on the product barcode, with the background slightly blurred to simulate a camera viewfinder's depth of field." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDxPTIueQ4afDIprIG_9Hkm0z5Yxn74hZRATrwU2w8ETog9xFsz2i4Zw7CxrtJjrc1MBPw9Yc6xNgiy8-uKVg-LealpBNsGlLhLH4whtL8YxZLV58Jd-Pd41kPl_rFk6Tzu1pQCbSqrb8OCyVeAeKOZyk29S8kd2wB1zNmzWWmP4do3If_mPIUcgk2biWeBTPH946cBG364rIjy7TNBfYwpYuqUvwqFfpDHWEAcFPqrSd0nFQlSiZwWh-r1RsYjnimER3cpKe4"/>
<!-- 70% Black Overlay with cutout -->
<div class="absolute inset-0 bg-black/70 pointer-events-none" style="mask-image: radial-gradient(circle at center, transparent 35%, black 45%); -webkit-mask-image: -webkit-radial-gradient(center, circle, transparent 130px, black 131px);"></div>
</div>
<!-- Top Bar -->
<div class="relative z-10 flex items-center justify-between px-edge-margin pt-12 pb-4 w-full">
<button class="w-10 h-10 rounded-full bg-white/20 bg-blur flex items-center justify-center hover:bg-white/30 transition-colors">
<span class="material-symbols-outlined text-surface-white" data-icon="close">close</span>
</button>
<div class="flex bg-white/20 bg-blur rounded-full p-1">
<button class="px-4 py-1.5 rounded-full bg-surface-white text-on-surface font-label-bold text-label-bold transition-all shadow-sm">扫条码</button>
<button class="px-4 py-1.5 rounded-full text-surface-white font-label-bold text-label-bold transition-all hover:bg-white/10">扫包装</button>
</div>
<div class="w-10 h-10"></div> <!-- Spacer for centering -->
</div>
<!-- Scanner Area -->
<div class="relative z-10 flex-1 flex flex-col items-center justify-center">
<div class="relative w-[260px] h-[260px]">
<!-- Corner Markers -->
<div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-primary-container rounded-tl-lg"></div>
<div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-primary-container rounded-tr-lg"></div>
<div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-primary-container rounded-bl-lg"></div>
<div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-primary-container rounded-br-lg"></div>
<!-- Scan Line -->
<div class="absolute left-0 right-0 h-1 scan-line bg-bg-lake shadow-[0_0_8px_#EAF3FF]"></div>
</div>
<p class="mt-8 font-body-sm text-body-sm text-surface-white/80 tracking-wide text-center">将条形码放入框内，即可自动扫描</p>
</div>
<!-- Actions -->
<div class="relative z-10 flex justify-center gap-12 pb-stack-gap">
<button class="flex flex-col items-center gap-2 group">
<div class="w-14 h-14 rounded-full bg-white/10 bg-blur flex items-center justify-center border border-white/20 group-hover:bg-white/20 transition-all">
<span class="material-symbols-outlined text-surface-white text-[28px]" data-icon="photo_library">photo_library</span>
</div>
<span class="font-label-bold text-label-bold text-surface-white/90">相册</span>
</button>
<button class="flex flex-col items-center gap-2 group">
<div class="w-14 h-14 rounded-full bg-white/10 bg-blur flex items-center justify-center border border-white/20 group-hover:bg-white/20 transition-all">
<span class="material-symbols-outlined text-surface-white text-[28px]" data-icon="flashlight_on">flashlight_on</span>
</div>
<span class="font-label-bold text-label-bold text-surface-white/90">手电筒</span>
</button>
<button class="flex flex-col items-center gap-2 group">
<div class="w-14 h-14 rounded-full bg-white/10 bg-blur flex items-center justify-center border border-white/20 group-hover:bg-white/20 transition-all">
<span class="material-symbols-outlined text-surface-white text-[28px]" data-icon="edit_square">edit_square</span>
</div>
<span class="font-label-bold text-label-bold text-surface-white/90">手动输入</span>
</button>
</div>
<!-- Recent Additions Card -->
<div class="relative z-10 px-edge-margin pb-safe mb-6">
<div class="bg-white/15 bg-blur rounded-xl p-card-padding border border-white/20 shadow-lg">
<div class="flex items-center justify-between mb-3">
<h3 class="font-section-title text-section-title text-surface-white">最近添加</h3>
<span class="font-body-sm text-body-sm text-surface-white/70">查看全部 &gt;</span>
</div>
<div class="flex gap-4 overflow-x-auto pb-2 snap-x hide-scrollbar">
<!-- Item 1 -->
<div class="snap-start flex-shrink-0 w-16 flex flex-col items-center gap-2">
<div class="w-16 h-16 rounded-lg bg-surface-white/20 flex items-center justify-center overflow-hidden border border-white/10">
<span class="material-symbols-outlined text-surface-white text-3xl opacity-50" data-icon="pets">pets</span>
</div>
</div>
<!-- Item 2 -->
<div class="snap-start flex-shrink-0 w-16 flex flex-col items-center gap-2">
<div class="w-16 h-16 rounded-lg bg-surface-white/20 flex items-center justify-center overflow-hidden border border-white/10">
<span class="material-symbols-outlined text-surface-white text-3xl opacity-50" data-icon="medication">medication</span>
</div>
</div>
<!-- Empty Slot -->
<div class="snap-start flex-shrink-0 w-16 flex flex-col items-center gap-2">
<div class="w-16 h-16 rounded-lg bg-surface-white/5 border border-dashed border-white/30 flex items-center justify-center">
<span class="material-symbols-outlined text-surface-white/40" data-icon="add">add</span>
</div>
</div>
</div>
</div>
</div>
<style>
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
