name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma:generate

      - name: Typecheck (all workspaces)
        run: pnpm -r typecheck

      - name: Backend smoke (zero-dep scaffold)
        run: pnpm smoke:api

      - name: NestJS unit tests
        run: pnpm test

      - name: NestJS e2e
        run: pnpm test:e2e

      - name: NestJS build
        run: pnpm --filter @family-inventory/server-nest build

      - name: H5 client build
        run: pnpm build:h5
