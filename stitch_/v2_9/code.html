<!DOCTYPE html>

<html class="light" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>添加商品</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
        /* Hide scrollbar for clean look */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "surface-container-high": "#d6ecef",
                        "bg-lake": "#EAF3FF",
                        "on-secondary-container": "#002959",
                        "primary": "#006c49",
                        "background": "#e9fdff",
                        "primary-fixed-dim": "#51dea3",
                        "error": "#ba1a1a",
                        "tertiary-container": "#ff7c5e",
                        "surface-white": "#FFFFFF",
                        "on-primary-container": "#00422b",
                        "on-secondary-fixed-variant": "#00458e",
                        "surface-container-lowest": "#ffffff",
                        "on-secondary": "#ffffff",
                        "on-surface": "#0a1f21",
                        "surface-container": "#dcf2f4",
                        "surface-dim": "#c8dee0",
                        "inverse-surface": "#203436",
                        "on-error-container": "#93000a",
                        "on-tertiary-fixed-variant": "#8c1900",
                        "status-warning": "#D97706",
                        "inverse-on-surface": "#dff5f7",
                        "secondary-fixed-dim": "#abc7ff",
                        "on-tertiary-container": "#731300",
                        "surface-container-low": "#e1f8fa",
                        "error-container": "#ffdad6",
                        "bg-cloud": "#F8FBFA",
                        "on-error": "#ffffff",
                        "surface-container-highest": "#d0e7e9",
                        "on-primary-fixed": "#002113",
                        "on-secondary-fixed": "#001b3f",
                        "on-primary-fixed-variant": "#005236",
                        "bg-mint": "#E8F8F2",
                        "border-light": "#E5E7EB",
                        "secondary-fixed": "#d7e3ff",
                        "inverse-primary": "#51dea3",
                        "accent-yellow": "#FFE066",
                        "tertiary-fixed": "#ffdad2",
                        "surface-tint": "#006c49",
                        "on-primary": "#ffffff",
                        "surface-bright": "#e9fdff",
                        "on-tertiary": "#ffffff",
                        "on-background": "#0a1f21",
                        "status-success": "#16A34A",
                        "secondary": "#005cba",
                        "primary-fixed": "#71fbbd",
                        "on-tertiary-fixed": "#3d0600",
                        "surface-variant": "#d0e7e9",
                        "outline": "#6c7a71",
                        "tertiary-fixed-dim": "#ffb4a3",
                        "outline-variant": "#bbcabf",
                        "secondary-container": "#448ffd",
                        "on-surface-variant": "#3c4a42",
                        "surface": "#e9fdff",
                        "text-secondary": "#6B7280",
                        "status-error": "#DC2626",
                        "tertiary": "#ae3115",
                        "primary-container": "#18b981"
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    spacing: {
                        "stack-gap": "20px",
                        "button-height": "48px",
                        "item-gap": "12px",
                        "list-item-min-height": "56px",
                        "card-padding": "16px",
                        "edge-margin": "16px",
                        "safe-bottom": "34px"
                    },
                    fontFamily: {
                        "body-main": ["Be Vietnam Pro", "sans-serif"],
                        "section-title": ["Be Vietnam Pro", "sans-serif"],
                        "page-title": ["Be Vietnam Pro", "sans-serif"],
                        "body-sm": ["Be Vietnam Pro", "sans-serif"],
                        "label-bold": ["Be Vietnam Pro", "sans-serif"],
                        "numeric-display": ["Be Vietnam Pro", "sans-serif"]
                    },
                    fontSize: {
                        "body-main": ["15px", { lineHeight: "22px", fontWeight: "400" }],
                        "section-title": ["18px", { lineHeight: "26px", fontWeight: "600" }],
                        "page-title": ["24px", { lineHeight: "32px", fontWeight: "700" }],
                        "body-sm": ["13px", { lineHeight: "18px", fontWeight: "400" }],
                        "label-bold": ["12px", { lineHeight: "16px", letterSpacing: "0.02em", fontWeight: "600" }],
                        "numeric-display": ["28px", { lineHeight: "36px", fontWeight: "700" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-bg-cloud min-h-screen pb-[120px]">
<!-- TopAppBar -->
<header class="bg-bg-cloud dark:bg-inverse-surface w-full top-0 sticky flex items-center justify-between px-edge-margin h-button-height z-50">
<button class="text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 flex items-center justify-center w-[24px] h-[24px]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back_ios_new</span>
</button>
<h1 class="font-section-title text-section-title text-on-surface flex-1 text-center">添加商品</h1>
<button class="text-primary-container font-label-bold text-label-bold hover:opacity-80 transition-opacity active:scale-95">
            保存
        </button>
</header>
<main class="px-edge-margin">
<!-- Image Upload Area -->
<div class="mt-stack-gap mb-stack-gap flex justify-center">
<button class="w-[160px] h-[160px] rounded-lg border-2 border-dashed border-outline-variant bg-surface-white flex flex-col items-center justify-center gap-2 hover:bg-surface-container-low transition-colors active:scale-95">
<span class="material-symbols-outlined text-[40px] text-text-secondary" style="font-variation-settings: 'FILL' 0;">photo_camera</span>
<span class="font-body-sm text-body-sm text-text-secondary">上传商品图片</span>
</button>
</div>
<!-- Form Group: Basic Info -->
<div class="bg-surface-white rounded-lg p-card-padding mb-stack-gap shadow-[0_4px_16px_rgba(21,61,53,0.02)]">
<h2 class="font-section-title text-section-title text-on-surface mb-item-gap">基础信息</h2>
<div class="flex flex-col gap-0">
<!-- Product Name -->
<div class="min-h-list-item-min-height flex flex-col justify-center border-b border-border-light py-2">
<label class="font-body-main text-body-main text-on-surface mb-1 flex items-center">
                        商品名称 <span class="text-status-error ml-1">*</span>
</label>
<input class="w-full bg-transparent border-none p-0 font-body-main text-body-main text-on-surface placeholder:text-outline-variant focus:ring-0" placeholder="请输入商品名称" type="text"/>
</div>
<!-- Category Chips -->
<div class="py-4 border-b border-border-light">
<label class="font-body-main text-body-main text-on-surface block mb-3">分类</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full border border-primary-container bg-bg-mint text-primary-container font-body-sm text-body-sm transition-colors">狗粮</button>
<button class="px-4 py-2 rounded-full border border-border-light bg-surface-white text-text-secondary font-body-sm text-body-sm hover:border-primary-container hover:text-primary-container transition-colors">猫粮</button>
<button class="px-4 py-2 rounded-full border border-border-light bg-surface-white text-text-secondary font-body-sm text-body-sm hover:border-primary-container hover:text-primary-container transition-colors">零食</button>
<button class="px-4 py-2 rounded-full border border-border-light bg-surface-white text-text-secondary font-body-sm text-body-sm hover:border-primary-container hover:text-primary-container transition-colors">保健品</button>
<button class="px-4 py-2 rounded-full border border-border-light bg-surface-white text-text-secondary font-body-sm text-body-sm hover:border-primary-container hover:text-primary-container transition-colors">用品</button>
</div>
</div>
<!-- Brand -->
<div class="min-h-list-item-min-height flex items-center border-b border-border-light">
<label class="font-body-main text-body-main text-on-surface w-[80px]">品牌</label>
<input class="flex-1 bg-transparent border-none p-0 font-body-main text-body-main text-on-surface text-right placeholder:text-outline-variant focus:ring-0" placeholder="如：渴望、巅峰" type="text"/>
</div>
<!-- Specification -->
<div class="min-h-list-item-min-height flex items-center border-b border-border-light">
<label class="font-body-main text-body-main text-on-surface w-[80px]">规格</label>
<input class="flex-1 bg-transparent border-none p-0 font-body-main text-body-main text-on-surface text-right placeholder:text-outline-variant focus:ring-0" placeholder="如：1.5kg" type="text"/>
</div>
<!-- Flavor -->
<div class="min-h-list-item-min-height flex items-center">
<label class="font-body-main text-body-main text-on-surface w-[80px]">口味</label>
<input class="flex-1 bg-transparent border-none p-0 font-body-main text-body-main text-on-surface text-right placeholder:text-outline-variant focus:ring-0" placeholder="选填，如：鸡肉味" type="text"/>
</div>
</div>
</div>
<!-- Form Group: Initial Stock Info -->
<div class="bg-surface-white rounded-lg p-card-padding mb-stack-gap shadow-[0_4px_16px_rgba(21,61,53,0.02)]">
<h2 class="font-section-title text-section-title text-on-surface mb-item-gap">首批入库信息</h2>
<div class="flex flex-col gap-0">
<!-- Quantity Stepper -->
<div class="min-h-list-item-min-height flex items-center justify-between border-b border-border-light">
<label class="font-body-main text-body-main text-on-surface">数量</label>
<div class="flex items-center gap-3">
<button class="w-[32px] h-[32px] rounded-full bg-surface-container-highest flex items-center justify-center text-on-surface-variant hover:bg-surface-dim transition-colors">
<span class="material-symbols-outlined text-[20px]">remove</span>
</button>
<span class="font-numeric-display text-section-title text-on-surface min-w-[32px] text-center">1</span>
<button class="w-[32px] h-[32px] rounded-full bg-bg-mint text-primary-container flex items-center justify-center hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-[20px]">add</span>
</button>
</div>
</div>
<!-- Date Picker (Simulated) -->
<div class="min-h-list-item-min-height flex items-center justify-between border-b border-border-light cursor-pointer">
<label class="font-body-main text-body-main text-on-surface">入库日期</label>
<div class="flex items-center gap-2 text-on-surface">
<span class="font-body-main text-body-main">2023-10-25</span>
<span class="material-symbols-outlined text-[20px] text-text-secondary" style="font-variation-settings: 'FILL' 0;">calendar_month</span>
</div>
</div>
<!-- Price -->
<div class="min-h-list-item-min-height flex items-center border-b border-border-light">
<label class="font-body-main text-body-main text-on-surface w-[80px]">购入单价</label>
<div class="flex-1 flex justify-end items-center gap-1">
<span class="font-body-main text-body-main text-on-surface">¥</span>
<input class="w-[100px] bg-transparent border-none p-0 font-body-main text-body-main text-on-surface text-right placeholder:text-outline-variant focus:ring-0" placeholder="0.00" type="number"/>
</div>
</div>
<!-- Channel Chips -->
<div class="py-4 border-b border-border-light">
<label class="font-body-main text-body-main text-on-surface block mb-3">购入渠道</label>
<div class="flex flex-wrap gap-2">
<button class="px-4 py-2 rounded-full border border-primary-container bg-bg-mint text-primary-container font-body-sm text-body-sm transition-colors">淘宝</button>
<button class="px-4 py-2 rounded-full border border-border-light bg-surface-white text-text-secondary font-body-sm text-body-sm hover:border-primary-container hover:text-primary-container transition-colors">京东</button>
<button class="px-4 py-2 rounded-full border border-border-light bg-surface-white text-text-secondary font-body-sm text-body-sm hover:border-primary-container hover:text-primary-container transition-colors">线下门店</button>
<button class="px-4 py-2 rounded-full border border-border-light bg-surface-white text-text-secondary font-body-sm text-body-sm hover:border-primary-container hover:text-primary-container transition-colors flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">add</span> 其他
                        </button>
</div>
</div>
<!-- Storage Location -->
<div class="min-h-list-item-min-height flex items-center border-b border-border-light">
<label class="font-body-main text-body-main text-on-surface w-[80px]">存放位置</label>
<input class="flex-1 bg-transparent border-none p-0 font-body-main text-body-main text-on-surface text-right placeholder:text-outline-variant focus:ring-0" placeholder="如：客厅储物柜" type="text"/>
</div>
<!-- Opened Toggle -->
<div class="min-h-list-item-min-height flex items-center justify-between pt-2">
<div>
<label class="font-body-main text-body-main text-on-surface block">已开封</label>
<span class="font-body-sm text-body-sm text-text-secondary">标记为正在使用的商品</span>
</div>
<!-- Toggle Switch CSS implementation -->
<label class="relative inline-flex items-center cursor-pointer">
<input class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-surface-container-highest peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-surface-white after:border-border-light after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary-container"></div>
</label>
</div>
</div>
</div>
</main>
<!-- Bottom Fixed Actions -->
<div class="fixed bottom-0 left-0 w-full bg-surface-white border-t border-border-light px-edge-margin pt-3 pb-safe-bottom z-50 flex gap-3 shadow-[0_-4px_16px_rgba(21,61,53,0.06)]">
<button class="flex-1 h-button-height bg-bg-mint text-on-surface font-label-bold text-label-bold rounded-lg flex items-center justify-center hover:opacity-80 transition-opacity active:scale-95">
            保存并继续添加
        </button>
<button class="flex-1 h-button-height bg-primary-container text-surface-white font-label-bold text-label-bold rounded-lg flex items-center justify-center hover:opacity-90 transition-opacity active:scale-95 shadow-sm">
            保存
        </button>
</div>
<!-- Ensure safe area spacing works even if not natively supported -->
<style>
        .pb-safe-bottom { padding-bottom: calc(12px + env(safe-area-inset-bottom, 22px)); }
    </style>
</body></html>
